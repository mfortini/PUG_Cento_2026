<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PUG — Cento</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1 id="map-title">PUG — Cento</h1>
      <p id="map-desc" class="subtitle">Consultazione cartografica</p>
    </div>
    <div class="header-actions">
      <label class="confine-toggle">
        <input type="checkbox" id="confine-toggle" checked />
        <span>Confine comunale</span>
      </label>
      <label class="opacity-control">
        Opacità overlay
        <input type="range" id="opacity" min="0" max="1" step="0.05" value="0.85" />
        <span id="opacity-value" class="opacity-value">85%</span>
      </label>
    </div>
  </header>

  <main id="map"></main>

  <footer class="footer">
    <span id="map-attribution" class="footer-attribution">Basemap &copy; OpenStreetMap</span>
    <span id="coords"></span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/map.js"></script>
</body>
</html>
